<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Methods - UniLink</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1><i class="fas fa-graduation-cap"></i> UniLink</h1>
            </div>
            <div class="navbar-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="#" id="logoutBtn" class="btn btn-secondary">Logout</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-container" style="padding: 40px 20px; max-width: 1100px; margin: auto;">
        <div style="display: flex; flex-wrap: wrap; gap: 20px;">
            <div style="flex: 1 1 360px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08);">
                <h2 style="margin-bottom: 20px;"><i class="fas fa-wallet"></i> Manage Payment Methods</h2>
                <p style="color: #555; line-height: 1.8; margin-bottom: 20px;">Save your Paybill or Till numbers and set a default payment method for faster activation payments.</p>

                <form id="paymentMethodForm">
                    <input type="hidden" id="methodId" name="methodId" value="">

                    <div class="form-group">
                        <label for="methodName">Method Type *</label>
                        <select id="methodName" name="methodName" required>
                            <option value="paybill">Paybill</option>
                            <option value="till">Till</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="accountNumber">Paybill / Till Number *</label>
                        <input type="text" id="accountNumber" name="accountNumber" placeholder="e.g. 123456" required>
                    </div>

                    <div class="form-group">
                        <label for="businessName">Business Name *</label>
                        <input type="text" id="businessName" name="businessName" placeholder="e.g. UniLink Academy" required>
                    </div>

                    <div class="form-group" style="display: flex; align-items: center; gap: 12px; margin-bottom: 18px;">
                        <input type="checkbox" id="isDefault" name="isDefault">
                        <label for="isDefault" style="margin: 0; font-weight: 500;">Set as default payment method</label>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-save"></i> Save Payment Method
                    </button>
                </form>

                <div class="alert alert-success" id="paymentMethodSuccess" style="display:none; margin-top: 20px;"></div>
                <div class="alert alert-error" id="paymentMethodError" style="display:none; margin-top: 20px;"></div>
            </div>

            <div style="flex: 2 1 560px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px;">
                    <div>
                        <h2 style="margin: 0;"><i class="fas fa-list"></i> Saved Methods</h2>
                        <p style="color: #555; margin: 8px 0 0 0;">Your saved Paybill and Till numbers are listed here.</p>
                    </div>
                    <button id="refreshMethods" class="btn btn-secondary" style="height: 40px; white-space: nowrap;"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>

                <div id="paymentMethodsList">
                    <p style="color: #666;">Loading payment methods...</p>
                </div>
            </div>
        </div>
    </div>

    <footer style="margin-top: 30px; text-align: center; padding: 20px 0; color: #666;">
        <p>&copy; 2026 UniLink. All rights reserved.</p>
    </footer>

    <script src="../../js/utils.js"></script>
    <script src="../../js/payment-methods.js"></script>
</body>
</html>
